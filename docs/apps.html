<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlatFree — Application Store</title>
  <meta name="description" content="Browse and search the FlatFree Flatpak application store. All apps are free and open source.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="search.js" defer></script>
  <script src="appstore.js" defer></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="page-wrap">
    <div id="page-scale">
      <header class="page-header">
        <div class="header-content">
          <a href="index.html" class="logo">
            <div class="logo-img">FF</div>
            <span class="logo-text">Flat<span>Free</span></span>
          </a>
          <div class="nav-search"><input type="text" class="nav-search-input" placeholder="Search apps..." id="navSearch"></div>
        </div>
      </header>

      <div class="hero-header">
        <h1>Application Store</h1>
        <p class="subtitle">Browse all available FlatFree applications</p>
      </div>

      <div class="page-wrapper">
        <main id="main-content" class="content-feed">
          <div class="appstore-toolbar">
            <div class="appstore-search">
              <input type="text" id="appstoreSearch" placeholder="Search apps by name, ID, or description..." autofocus>
            </div>
            <div class="appstore-controls">
              <span class="appstore-count" id="appCount"></span>
              <div class="appstore-view-toggle">
                <button class="view-btn active" data-view="grid" title="Grid view"><i class="bi bi-grid-3x3-gap"></i></button>
                <button class="view-btn" data-view="list" title="List view"><i class="bi bi-list"></i></button>
              </div>
            </div>
          </div>

          <div id="appGrid" class="appstore-grid"></div>
          <div id="appStoreFooter" class="appstore-footer"></div>
        </main>
      </div>

      <footer class="page-footer">
        <p>FlatFree is not affiliated with Flathub or the Flatpak project.</p>
        <p><a href="https://github.com/spivanatalie64/FlatFree">GitHub</a> &middot; <a href="https://flatfree.pages.dev">flatfree.pages.dev</a> &middot; <a href="https://flatfree.acreetionos.org">flatfree.acreetionos.org</a></p>
        <p>Maintained by Natalie, with Love <span class="footer-love">&hearts;</span></p>
      </footer>
    </div>
  </div>

  <script>
  (function(){'use strict';try{
    var isOpen=false,sidebar,overlay,hamburger;
    function init(){
      var header=document.querySelector('.header-content');
      if(!header||document.getElementById('hamburger'))return;
      hamburger=document.createElement('button');
      hamburger.id='hamburger';
      hamburger.setAttribute('aria-label','Menu');
      hamburger.setAttribute('aria-expanded','false');
      hamburger.innerHTML='<span></span><span></span><span></span>';
      hamburger.addEventListener('click',function(e){e.preventDefault();toggle();});
      header.appendChild(hamburger);
      overlay=document.createElement('div');
      overlay.id='sidebar-overlay';
      overlay.addEventListener('click',close);
      document.body.appendChild(overlay);
      sidebar=document.createElement('div');
      sidebar.id='sidebar';
      sidebar.setAttribute('role','dialog');
      sidebar.setAttribute('aria-label','Site navigation');
      sidebar.innerHTML='<div class="sidebar-body"><ul><li><a href="index.html"><i class="bi bi-house"></i> Home</a></li><li><a href="apps.html"><i class="bi bi-grid"></i> Apps</a></li><li><a href="about.html"><i class="bi bi-info-circle"></i> About</a></li><li><a href="guidelines.html"><i class="bi bi-file-text"></i> Guidelines</a></li><li><a href="docs.html"><i class="bi bi-book"></i> Docs</a></li><li><a href="setup.html"><i class="bi bi-gear"></i> Setup</a></li><li><a href="faq.html"><i class="bi bi-question-circle"></i> FAQ</a></li><li><a href="blog.html"><i class="bi bi-pencil-square"></i> Blog</a></li><li><a href="contribute.html"><i class="bi bi-heart"></i> Contribute</a></li></ul></div><div class="sidebar-footer"><a href="https://github.com/spivanatalie64/FlatFree" target="_blank"><i class="bi bi-github"></i> GitHub</a><a href="https://flatfree.pages.dev" target="_blank"><i class="bi bi-globe2"></i> Visit</a></div>';
      document.body.appendChild(sidebar);
    }
    function toggle(){if(isOpen){close();}else{open();}}
    function open(){isOpen=true;document.body.classList.add('sidebar-open');if(hamburger){hamburger.classList.add('active');hamburger.setAttribute('aria-expanded','true');}if(sidebar){sidebar.classList.add('open');}}
    function close(){isOpen=false;document.body.classList.remove('sidebar-open');if(hamburger){hamburger.classList.remove('active');hamburger.setAttribute('aria-expanded','false');}if(sidebar){sidebar.classList.remove('open');}}
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&isOpen)close();});
    window.addEventListener('pageshow',function(){document.body.classList.remove('sidebar-open');});
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
  }catch(e){console.error('Sidebar init error:',e);}})();
  </script>
</body>
</html>
