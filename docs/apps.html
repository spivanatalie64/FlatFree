<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlatFree — Application Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="search.js" defer></script>
  <script src="appstore.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">FlatFree</a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Toggle navigation">☰</button>
      <div class="nav-search"><input type="text" class="nav-search-input" placeholder="Search apps..." id="navSearch"></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="apps.html" class="active">Apps</a>
        <a href="about.html">About</a>
        <a href="guidelines.html">Guidelines</a>
        <a href="docs.html">Docs</a>
        <a href="setup.html">Setup</a>
        <a href="faq.html">FAQ</a>
        <a href="blog.html">Blog</a>
        <a href="contribute.html">Contribute</a>
      </div>
    </div>
  </nav>

  <header>
    <div class="container">
      <h1>FlatFree</h1>
      <p class="subtitle">A community Flatpak repository — free, open, and built for everyone.</p>
    </div>
  </header>

  <main class="container">
    <div class="appstore-toolbar">
      <div class="appstore-search">
        <input type="text" id="appstoreSearch" placeholder="Search apps by name, ID, or description..." autofocus>
      </div>
      <div class="appstore-controls">
        <span class="appstore-count" id="appCount"></span>
        <div class="appstore-view-toggle">
          <button class="view-btn active" data-view="grid" title="Grid view">⊞</button>
          <button class="view-btn" data-view="list" title="List view">☰</button>
        </div>
      </div>
    </div>

    <div id="appGrid" class="appstore-grid"></div>
    <div id="appStoreFooter" class="appstore-footer"></div>
  </main>

  <footer>
    <div class="container">
      <p>FlatFree is not affiliated with Flathub or the Flatpak project. We don't want to be. | <a href="https://github.com/spivanatalie64/FlatFree">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
