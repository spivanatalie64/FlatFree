<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlatFree — App Details</title>
  <meta name="description" content="FlatFree Flatpak application details.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="search.js" defer></script>
  <style>
    .app-detail-loading { text-align: center; padding: 80px 24px; }
    .app-detail-loading .spinner { margin-bottom: 16px; }
    .app-detail-loading p { color: var(--acreetion-text-muted); }
    .app-detail-error { text-align: center; padding: 80px 24px; }
    .app-detail-error h2 { color: var(--acreetion-text-bright); margin-bottom: 8px; }
    .app-detail-error p { color: var(--acreetion-text-muted); margin-bottom: 16px; }
    .btn-install { position: relative; min-width: 140px; justify-content: center; }
    .btn-install:disabled { opacity: 0.7; cursor: wait; }
    .btn-copy:hover { background: var(--acreetion-box-bg) !important; color: var(--acreetion-text-bright) !important; border-color: var(--acreetion-purple-border) !important; }
    .btn-copy:active { transform: scale(0.95); }
    .install-info .code-block { transition: border-color 0.2s; }
    .install-info .code-block:hover { border-color: var(--acreetion-purple-border); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="page-wrap">
    <div id="page-scale">
      <header class="page-header">
        <div class="header-content">
          <a href="index.html" class="logo">
            <div class="logo-img">FF</div>
            <span class="logo-text">Flat<span>Free</span></span>
          </a>
          <div class="nav-search"><input type="text" class="nav-search-input" placeholder="Search apps..." id="navSearch"></div>
        </div>
      </header>
      <div class="hero-header" id="heroHeader">
        <h1 id="appTitle">FlatFree</h1>
        <p class="subtitle" id="appSubtitle">Application details</p>
      </div>
      <div class="page-wrapper">
        <main id="main-content" class="content-feed">
          <div id="appContent" class="app-detail">
            <div class="app-detail-loading">
              <div class="spinner"></div>
              <p>Loading application details...</p>
            </div>
          </div>
        </main>
      </div>
      <footer class="page-footer">
        <p>FlatFree is not affiliated with Flathub or the Flatpak project.</p>
        <p><a href="https://github.com/spivanatalie64/FlatFree">GitHub</a> &middot; <a href="https://flatfree.pages.dev">flatfree.pages.dev</a> &middot; <a href="https://flatfree.acreetionos.org">flatfree.acreetionos.org</a></p>
        <p>Maintained by Natalie, with Love <span class="footer-love">&hearts;</span></p>
      </footer>
    </div>
  </div>
  <script>
  (function(){'use strict';try{
    var isOpen=false,sidebar,overlay,hamburger;
    function init(){
      var header=document.querySelector('.header-content');
      if(!header||document.getElementById('hamburger'))return;
      hamburger=document.createElement('button');
      hamburger.id='hamburger';
      hamburger.setAttribute('aria-label','Menu');
      hamburger.setAttribute('aria-expanded','false');
      hamburger.innerHTML='<span></span><span></span><span></span>';
      hamburger.addEventListener('click',function(e){e.preventDefault();toggle();});
      header.appendChild(hamburger);
      overlay=document.createElement('div');
      overlay.id='sidebar-overlay';
      overlay.addEventListener('click',close);
      document.body.appendChild(overlay);
      sidebar=document.createElement('div');
      sidebar.id='sidebar';
      sidebar.setAttribute('role','dialog');
      sidebar.setAttribute('aria-label','Site navigation');
      sidebar.innerHTML='<div class="sidebar-body"><ul><li><a href="index.html"><i class="bi bi-house"></i> Home</a></li><li><a href="apps.html"><i class="bi bi-grid"></i> Apps</a></li><li><a href="about.html"><i class="bi bi-info-circle"></i> About</a></li><li><a href="guidelines.html"><i class="bi bi-file-text"></i> Guidelines</a></li><li><a href="docs.html"><i class="bi bi-book"></i> Docs</a></li><li><a href="setup.html"><i class="bi bi-gear"></i> Setup</a></li><li><a href="faq.html"><i class="bi bi-question-circle"></i> FAQ</a></li><li><a href="blog.html"><i class="bi bi-pencil-square"></i> Blog</a></li><li><a href="contribute.html"><i class="bi bi-heart"></i> Contribute</a></li></ul></div><div class="sidebar-footer"><a href="https://github.com/spivanatalie64/FlatFree" target="_blank"><i class="bi bi-github"></i> GitHub</a><a href="https://flatfree.pages.dev" target="_blank"><i class="bi bi-globe2"></i> Visit</a></div>';
      document.body.appendChild(sidebar);
    }
    function toggle(){if(isOpen){close();}else{open();}}
    function open(){isOpen=true;document.body.classList.add('sidebar-open');if(hamburger){hamburger.classList.add('active');hamburger.setAttribute('aria-expanded','true');}if(sidebar){sidebar.classList.add('open');}}
    function close(){isOpen=false;document.body.classList.remove('sidebar-open');if(hamburger){hamburger.classList.remove('active');hamburger.setAttribute('aria-expanded','false');}if(sidebar){sidebar.classList.remove('open');}}
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&isOpen)close();});
    window.addEventListener('pageshow',function(){document.body.classList.remove('sidebar-open');});
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
  }catch(e){console.error('Sidebar init error:',e);}})();
  </script>
  <script>
  (function(){
    var appData = null;

    function tryFlatpakProtocol(appId) {
      // Try the flatpak:// URI scheme
      var flatpakUri = 'flatpak://install?repo=flatfree&app=' + encodeURIComponent(appId);
      var fallbackUri = 'flatpak:install?repo=flatfree&app=' + encodeURIComponent(appId);

      // Try standard flatpak:// first
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = flatpakUri;
      document.body.appendChild(iframe);

      // Also try navigating a hidden link
      var link = document.createElement('a');
      link.href = flatpakUri;
      link.style.display = 'none';
      document.body.appendChild(link);

      // Try multiple approaches
      setTimeout(function() {
        try { window.location.href = flatpakUri; } catch(e) {}
      }, 100);

      setTimeout(function() {
        try { window.location.href = fallbackUri; } catch(e) {}
      }, 300);

      // Clean up after attempt
      setTimeout(function() {
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        if (link.parentNode) link.parentNode.removeChild(link);
      }, 2000);
    }

    function setupInstallButton() {
      var btn = document.querySelector('.btn-install');
      if (!btn) return;
      var appId = btn.getAttribute('data-appid');
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = 'Opening Flatpak... <span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:middle;margin-left:4px"></span>';
        tryFlatpakProtocol(appId);
        // After 3 seconds, reset and highlight terminal commands
        setTimeout(function() {
          btn.disabled = false;
          btn.innerHTML = 'Install';
          // Scroll to install section and flash it
          var installSection = document.querySelector('.install-info');
          if (installSection) {
            installSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            installSection.style.transition = 'box-shadow 0.3s';
            installSection.style.boxShadow = '0 0 20px rgba(155,89,182,0.4)';
            setTimeout(function() {
              installSection.style.boxShadow = 'none';
            }, 2000);
          }
        }, 3000);
      });
    }

    function setupCopyButtons() {
      var btns = document.querySelectorAll('.btn-copy');
      for (var i = 0; i < btns.length; i++) {
        (function(btn) {
          btn.addEventListener('click', function() {
            var targetId = btn.getAttribute('data-target');
            var codeEl = document.getElementById(targetId);
            if (!codeEl) return;
            var text = codeEl.textContent || codeEl.innerText;
            // Copy to clipboard
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(text).then(function() {
                btn.innerHTML = '<i class="bi bi-check"></i> Copied!';
                setTimeout(function() { btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 2000);
              }).catch(function() {
                fallbackCopy(text, btn);
              });
            } else {
              fallbackCopy(text, btn);
            }
          });
        })(btns[i]);
      }
    }

    function fallbackCopy(text, btn) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        btn.innerHTML = '<i class="bi bi-check"></i> Copied!';
        setTimeout(function() { btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 2000);
      } catch(e) {}
      document.body.removeChild(ta);
    }

    function getInitials(name) {
      return name.split(' ').map(function(w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
    }

    function getColor(id) {
      var hash = 0;
      for (var i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
      var h = Math.abs(hash) % 360;
      return 'hsl(' + h + ', 55%, 35%)';
    }

    function escapeHtml(text) {
      if (!text) return '';
      var d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function renderApp(app) {
      var initials = getInitials(app.name);
      var color = getColor(app.id);
      var manifestPath = app.path || (app.id + '/' + app.id + '.json');
      var manifestUrl = 'https://github.com/spivanatalie64/FlatFree/tree/main/' + manifestPath;
      var runtimeName = app.runtime || 'Unknown';
      var runtimeVersion = app.runtimeVersion || '';
      var license = app.projectLicense || app.license || 'FOSS';
      var description = app.description || app.name + ' — a FlatFree Flatpak application.';

      document.title = 'FlatFree — ' + app.name;
      document.querySelector('meta[name="description"]').content = description;

      document.getElementById('appTitle').textContent = app.name;
      document.getElementById('appSubtitle').textContent = app.id;

      document.getElementById('appContent').innerHTML =
        '<div class="app-detail-header">' +
          '<div class="app-detail-icon">' +
            '<div class="app-icon-placeholder" style="background:' + color + ';color:#fff;font-size:2.5rem;font-weight:800;display:flex;align-items:center;justify-content:center;width:100%;height:100%">' + escapeHtml(initials) + '</div>' +
          '</div>' +
          '<div class="app-detail-meta">' +
            '<h2>' + escapeHtml(app.name) + '</h2>' +
            '<p class="app-id">' + escapeHtml(app.id) + '</p>' +
            '<p class="app-version">FlatFree Repository</p>' +
            '<p class="app-desc" style="font-size: 1rem;">' + escapeHtml(description) + '</p>' +
            '<div class="app-actions">' +
              '<button class="btn btn-lg btn-install" data-appid="' + escapeHtml(app.id) + '">Install</button>' +
              '<a href="' + escapeHtml(manifestUrl) + '" class="btn btn-lg btn-outline" target="_blank" rel="noopener">View Manifest</a>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="app-description">' +
          '<h3>Description</h3>' +
          '<p>' + escapeHtml(app.name) + ' is a free and open source Flatpak application available in the FlatFree repository.</p>' +
          '<p>Runtime: ' + escapeHtml(runtimeName) + ' ' + escapeHtml(runtimeVersion) + '</p>' +
          '<p>This application is free software and welcomes contributions from all developers regardless of how they build their software.</p>' +
        '</div>' +
        '<div class="app-info-table">' +
          '<h3>Details</h3>' +
          '<table>' +
            '<tr><td>App ID</td><td>' + escapeHtml(app.id) + '</td></tr>' +
            '<tr><td>License</td><td>' + escapeHtml(license) + '</td></tr>' +
            '<tr><td>Runtime</td><td>' + escapeHtml(runtimeName) + ' ' + escapeHtml(runtimeVersion) + '</td></tr>' +
            '<tr><td>Branch</td><td>stable</td></tr>' +
            '<tr><td>Repository</td><td>FlatFree</td></tr>' +
            '<tr><td>Source</td><td><a href="' + escapeHtml(manifestUrl) + '" style="color:var(--acreetion-purple)" target="_blank" rel="noopener">View Manifest</a></td></tr>' +
          '</table>' +
        '</div>' +
        '<div class="install-info">' +
          '<h2>Install <span style="font-size:0.7rem;font-weight:400;color:var(--acreetion-text-muted)">via Flatpak</span></h2>' +
          '<div class="install-protocol-note" style="background:var(--acreetion-purple-dim);border:1px solid var(--acreetion-purple-border);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:0.85rem">' +
            '<i class="bi bi-info-circle" style="color:var(--acreetion-purple)"></i> ' +
            'Clicking <strong>Install</strong> will open your system\'s Flatpak handler. ' +
            'If nothing happens, use the terminal commands below.' +
          '</div>' +
          '<p style="font-weight:600;color:var(--acreetion-text-bright)">Step 1 &mdash; Add the FlatFree remote:</p>' +
          '<pre class="code-block" style="position:relative"><code id="cmdRemote">flatpak remote-add --if-not-exists flatfree https://natalie.acreetionos.org/FlatFree/flatfree.flatpakrepo</code><button class="btn-copy" data-target="cmdRemote" title="Copy to clipboard" style="position:absolute;top:8px;right:8px;background:var(--acreetion-box-bg);border:1px solid var(--acreetion-box-border);color:var(--acreetion-text);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem"><i class="bi bi-clipboard"></i> Copy</button></pre>' +
          '<p style="font-weight:600;color:var(--acreetion-text-bright)">Step 2 &mdash; Install ' + escapeHtml(app.name) + ':</p>' +
          '<pre class="code-block" style="position:relative"><code id="cmdInstall">flatpak install flatfree ' + escapeHtml(app.id) + '</code><button class="btn-copy" data-target="cmdInstall" title="Copy to clipboard" style="position:absolute;top:8px;right:8px;background:var(--acreetion-box-bg);border:1px solid var(--acreetion-box-border);color:var(--acreetion-text);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem"><i class="bi bi-clipboard"></i> Copy</button></pre>' +
          '<p style="font-weight:600;color:var(--acreetion-text-bright)">Step 3 &mdash; Run it:</p>' +
          '<pre class="code-block" style="position:relative"><code id="cmdRun">flatpak run ' + escapeHtml(app.id) + '</code><button class="btn-copy" data-target="cmdRun" title="Copy to clipboard" style="position:absolute;top:8px;right:8px;background:var(--acreetion-box-bg);border:1px solid var(--acreetion-box-border);color:var(--acreetion-text);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem"><i class="bi bi-clipboard"></i> Copy</button></pre>' +
        '</div>';
    }

    function showError(msg) {
      document.getElementById('appContent').innerHTML =
        '<div class="app-detail-error">' +
          '<h2>Application Not Found</h2>' +
          '<p>' + escapeHtml(msg) + '</p>' +
          '<a href="apps.html" class="btn">Browse Applications</a>' +
        '</div>';
    }

    function initApp() {
      var params = new URLSearchParams(window.location.search);
      var appId = params.get('id');

      if (!appId) {
        showError('No application specified. Please select an app from the app store.');
        return;
      }

      fetch('search.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var found = null;
          for (var i = 0; i < data.length; i++) {
            if (data[i].id === appId) {
              found = data[i];
              break;
            }
          }
          if (found) {
            renderApp(found);
            setupInstallButton();
            setupCopyButtons();
          } else {
            showError('Application "' + appId + '" was not found in the FlatFree repository.');
          }
        })
        .catch(function() {
          showError('Failed to load application data. Please try again later.');
        });
    }

    if (document.readyState !== 'loading') initApp();
    else document.addEventListener('DOMContentLoaded', initApp);
  })();
  </script>
</body>
</html>
